<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Active Campaigns</title>
    <link rel="stylesheet" href="/css/app.css">
    <link rel="stylesheet" href="/css/all-campaigns.css">
</head>

<body>
    <div id="navbar"></div>

    <div class="container">
        <h2 class="page-title">Active Campaigns</h2>
        <div id="campaignList" class="campaign-grid"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        fetch("/html/navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;

                const connectBtn = document.getElementById("connectBtn");
                if (connectBtn) {
                    connectBtn.addEventListener("click", connectWallet);
                }

                checkWalletStatus();
            });

        let contract;

        async function loadCampaigns() {
            if (!window.ethereum) {
                document.getElementById("campaignList").innerText = "MetaMask not detected!";
                return;
            }

            if (!web3) {
                web3 = new Web3(window.ethereum);
            }

            await window.ethereum.request({ method: "eth_accounts" });

            contract = new web3.eth.Contract(window.campaignABI, window.campaignAddress);


            try {
                const count = await contract.methods.campaignCount().call();
                console.log("Total campaigns:", count);

                const campaigns = await contract.methods.getActiveCampaigns().call();
                console.log("Active campaigns:", campaigns);

                const listDiv = document.getElementById("campaignList");
                listDiv.innerHTML = "";

                if (campaigns.length === 0) {
                    listDiv.innerHTML = "<p>No active campaigns found</p>";
                    return;
                }

                campaigns.forEach(c => {
                    const deadlineDate = new Date(c.deadline * 1000).toLocaleString();
                    const goalEther = web3.utils.fromWei(c.goal.toString(), "ether");
                    const fundsRaisedEther = web3.utils.fromWei(c.fundsRaised.toString(), "ether");

                    const card = `
    <div class="campaign-card" onclick="viewCampaign(${c.id})">
      <h3>${c.title}</h3>
      <p><strong>Goal:</strong> ${goalEther} ETH</p>
      <p><strong>Deadline:</strong> ${deadlineDate}</p>
    </div>
`;
                    listDiv.innerHTML += card;
                });

            } catch (err) {
                console.error("Error loading campaigns:", err);
                document.getElementById("campaignList").innerText = "Failed to load campaigns!";
            }
        }

        function viewCampaign(id) {
            window.location.href = `/html/campaign-details.html?id=${id}`;
        }

        window.addEventListener("load", loadCampaigns);
    </script>
</body>

</html>
