<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Campaign Details</title>
    <link rel="stylesheet" href="/css/app.css">
    <link rel="stylesheet" href="/css/campaign-details.css">
</head>

<body>
    <div id="navbar"></div>

    <div class="campaign-container">
        <h2 class="page-title">Campaign Details</h2>
        <div id="campaignDetails" class="campaign-card"></div>

        <div class="contribute-section">
            <h3>Contribute to this Campaign</h3>
            <input type="number" id="contributionAmount" placeholder="Amount in Ether" />
            <button onclick="contribute()">Contribute</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        let contract;

        fetch("/html/navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;

                const connectBtn = document.getElementById("connectBtn");
                if (connectBtn) {
                    connectBtn.addEventListener("click", connectWallet);
                }

                checkWalletStatus();
            });

        const params = new URLSearchParams(window.location.search);
        const campaignId = params.get("id");

        async function loadCampaignDetails() {
            web3 = new Web3(window.ethereum);
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            currentAccount = accounts[0];
            contract = new web3.eth.Contract(window.campaignABI, window.campaignAddress);

            try {
                const c = await contract.methods.campaigns(campaignId).call();
                const createdDate = new Date(c.createdAt * 1000).toLocaleString();
                const deadlineDate = new Date(c.deadline * 1000).toLocaleString();

                const fundsRaisedEther = web3.utils.fromWei(c.fundsRaised, "ether");
                const goalEther = web3.utils.fromWei(c.goal, "ether");

                const progressPercent = Math.min((fundsRaisedEther / goalEther) * 100, 100);
                document.getElementById("campaignDetails").innerHTML = `
          <h3>${c.title}</h3>
          <p>${c.description}</p>
          <p><strong>Goal:</strong> ${goalEther} ETH</p>
          <p><strong>Funds Raised:</strong> ${fundsRaisedEther} ETH</p>
          <div class="progress-bar">
            <div class="progress-bar-fill" style="width: ${progressPercent}%;"></div>
          </div>
          <p class="progress-percentage">${progressPercent.toFixed(1)}% funded</p>
          <p><strong>Created At:</strong> ${createdDate}</p>
          <p><strong>Deadline:</strong> ${deadlineDate}</p>
          <p><strong>Creator:</strong> ${c.creator}</p>
        `;

                const contributeSection = document.querySelector(".contribute-section");

                if (currentAccount.toLowerCase() === c.creator.toLowerCase()) {
                    // Creator view
                    let statusHTML = "";
                    if (c.isRefunded) {
                        statusHTML = `<p><em>Refunded</em></p>`;
                    } else if (c.isWithdrawn) {
                        statusHTML = `<p><em>Funds Withdrawn</em></p>`;
                    } else if (parseInt(c.fundsRaised) >= parseInt(c.goal)) {
                        statusHTML = `<button onclick="withdraw(${c.id})">Withdraw</button>`;
                    } else if (Date.now() / 1000 < c.deadline) {
                        statusHTML = `<p><em>In Progress</em></p>`;
                    } else if (Date.now() / 1000 >= c.deadline && parseInt(c.fundsRaised) < parseInt(c.goal)) {
                        // Goal not met - auto refund in progress
                        statusHTML = `<p><em>Auto Refunding...</em></p>`;
                    }
                    contributeSection.innerHTML = `<h3 id="statusTitle">Status</h3>${statusHTML}`;
                } else {
                    // Contributor view
                    let statusHTML = "";
                    if (c.isRefunded) {
                        statusHTML = `<p><em>Refunded</em></p>`;
                    } else if (parseInt(c.fundsRaised) >= parseInt(c.goal)) {
                        statusHTML = `<p><em>Goal Met</em></p>`;
                    } else if (Date.now() / 1000 < c.deadline) {
                        // Still active → allow contribution
                        contributeSection.style.display = "block";
                        statusHTML = "";
                    } else if (Date.now() / 1000 >= c.deadline) {
                        // Deadline passed - auto refund in progress
                        statusHTML = `<p><em>Auto Refunding...</em></p>`;
                    }
                    if (statusHTML) {
                        contributeSection.innerHTML = `<h3 id="statusTitle">Status</h3>${statusHTML}`;
                    }
                }
            } catch (err) {
                console.error(err);
                document.getElementById("campaignDetails").innerText = "Failed to load campaign!";
            }
        }

        async function withdraw(id) {
            try {
                await contract.methods.withdraw(id).send({ from: currentAccount });
                alert("Funds withdrawn successfully!");
                loadCampaignDetails(); // refresh
            } catch (err) {
                console.error(err);
                alert("Withdrawal failed!");
            }
        }

        async function contribute() {
            const amount = document.getElementById("contributionAmount").value;
            try {
                await contract.methods.contribute(campaignId).send({
                    from: currentAccount,
                    value: web3.utils.toWei(amount, "ether")
                });
                alert("Contribution successful!");
                
                // Refresh MetaMask balance
                await window.ethereum.request({ method: "eth_requestAccounts" });
                
                loadCampaignDetails(); // refresh details
            } catch (err) {
                console.error(err);
                alert("Contribution failed!");
            }
        }

        window.addEventListener("load", loadCampaignDetails);
    </script>
</body>

</html>
