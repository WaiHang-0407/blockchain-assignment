<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Create Campaign</title>
  <link rel="stylesheet" href="/css/create-campaign.css">
  <link rel="stylesheet" href="/css/app.css">
</head>

<body>
  <div id="navbar"></div>

  <div class="container">
    <h2>Create a New Campaign</h2>
    <div class="form-group">
      <label for="title">Campaign Title</label>
      <input type="text" id="title" placeholder="Enter campaign title">
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" placeholder="Describe your campaign"></textarea>
    </div>
    <div class="form-group">
      <label for="goal">Funding Goal (in Wei)</label>
      <input type="number" id="goal" placeholder="e.g. 1000000000000000000">
    </div>
    <div class="form-group">
      <label for="deadline">Deadline</label>
      <input type="datetime-local" id="deadline">
    </div>
    <button id="launch-campaign" onclick="createCampaign()">Launch Campaign</button>
    <p id="status"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
  <script>
    const ABI = [
	{
		"anonymous": false,
		"inputs": [
			{
				"indexed": true,
				"internalType": "uint256",
				"name": "id",
				"type": "uint256"
			},
			{
				"indexed": true,
				"internalType": "address",
				"name": "creator",
				"type": "address"
			},
			{
				"indexed": false,
				"internalType": "string",
				"name": "title",
				"type": "string"
			},
			{
				"indexed": false,
				"internalType": "uint256",
				"name": "goal",
				"type": "uint256"
			},
			{
				"indexed": false,
				"internalType": "uint256",
				"name": "deadline",
				"type": "uint256"
			}
		],
		"name": "CampaignCreated",
		"type": "event"
	},
	{
		"inputs": [
			{
				"internalType": "string",
				"name": "_title",
				"type": "string"
			},
			{
				"internalType": "string",
				"name": "_description",
				"type": "string"
			},
			{
				"internalType": "uint256",
				"name": "_goal",
				"type": "uint256"
			},
			{
				"internalType": "uint256",
				"name": "_deadline",
				"type": "uint256"
			}
		],
		"name": "createCampaign",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "campaignCount",
		"outputs": [
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"name": "campaigns",
		"outputs": [
			{
				"internalType": "uint256",
				"name": "id",
				"type": "uint256"
			},
			{
				"internalType": "address",
				"name": "creator",
				"type": "address"
			},
			{
				"internalType": "string",
				"name": "title",
				"type": "string"
			},
			{
				"internalType": "string",
				"name": "description",
				"type": "string"
			},
			{
				"internalType": "uint256",
				"name": "goal",
				"type": "uint256"
			},
			{
				"internalType": "uint256",
				"name": "deadline",
				"type": "uint256"
			},
			{
				"internalType": "uint256",
				"name": "fundsRaised",
				"type": "uint256"
			},
			{
				"internalType": "bool",
				"name": "isWithdrawn",
				"type": "bool"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "getActiveCampaigns",
		"outputs": [
			{
				"components": [
					{
						"internalType": "uint256",
						"name": "id",
						"type": "uint256"
					},
					{
						"internalType": "address",
						"name": "creator",
						"type": "address"
					},
					{
						"internalType": "string",
						"name": "title",
						"type": "string"
					},
					{
						"internalType": "string",
						"name": "description",
						"type": "string"
					},
					{
						"internalType": "uint256",
						"name": "goal",
						"type": "uint256"
					},
					{
						"internalType": "uint256",
						"name": "deadline",
						"type": "uint256"
					},
					{
						"internalType": "uint256",
						"name": "fundsRaised",
						"type": "uint256"
					},
					{
						"internalType": "bool",
						"name": "isWithdrawn",
						"type": "bool"
					}
				],
				"internalType": "struct Campaign.CampaignData[]",
				"name": "",
				"type": "tuple[]"
			}
		],
		"stateMutability": "view",
		"type": "function"
	}
];
    const Address = "0x9b69dec39638c73D11dFc9a28bf0849c96e2eD89";

    let web3, contract, currentAccount;

    async function connectContract() {
      if (!window.ethereum) {
        window.location.href = "/html/login.html"; // redirect if MetaMask not installed
        return;
      }
      web3 = new Web3(window.ethereum);
      const accounts = await window.ethereum.request({ method: "eth_accounts" });
      if (!accounts.length) {
        // no account connected → redirect to login
        window.location.href = "/html/login.html";
        return;
      }
      currentAccount = accounts[0];
      contract = new web3.eth.Contract(ABI, Address);
    }

    async function createCampaign() {
      await connectContract(); // ensures user is connected before creating
      if (!currentAccount) return; // safety check

      const title = document.getElementById("title").value;
      const description = document.getElementById("description").value;
      const goal = document.getElementById("goal").value;
      const deadlineInput = document.getElementById("deadline").value;
      const deadline = Math.floor(new Date(deadlineInput).getTime() / 1000);

      if (!title || !description || !goal || !deadlineInput) {
        document.getElementById("status").innerText = "Please fill in all fields!";
        return;
      }

      try {
        await contract.methods.createCampaign(title, description, goal, deadline).send({
          from: currentAccount,
          gas: 3000000
        });
        document.getElementById("status").innerText = "Campaign created successfully!";
        setTimeout(() => { window.location.href = "/html/all-campaigns.html"; }, 2000);
      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "Transaction failed!";
      }
    }

    // 🔑 Run check immediately when page loads
    window.addEventListener("load", connectContract);

    fetch("/html/navbar.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("navbar").innerHTML = data;
      })
      .catch(err => console.error("Error loading navbar:", err));
  </script>
</body>

</html>
