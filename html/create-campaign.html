<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Create Campaign</title>
  <link rel="stylesheet" href="/css/create-campaign.css">
  <link rel="stylesheet" href="/css/app.css">
</head>

<body>
  <div id="navbar"></div>

  <div class="container">
    <h2>Create a New Campaign</h2>
    <div class="form-group">
      <label for="title">Campaign Title</label>
      <input type="text" id="title" placeholder="Enter campaign title">
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" placeholder="Describe your campaign"></textarea>
    </div>
    <div class="form-group">
      <label for="goal">Funding Goal (in ETH)</label>
      <input type="number" id="goal" placeholder="e.g. 1.5">
    </div>
    <div class="form-group">
      <label for="deadline">Deadline</label>
      <input type="datetime-local" id="deadline">
    </div>
    <button id="launch-campaign" onclick="createCampaign()">Launch Campaign</button>
    <p id="status"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    window.addEventListener("load", async () => {
      await guardPage();

      // Guard passed — show the page
      document.body.style.display = "block"; // ✅

      let contract;

      fetch("/html/navbar.html")
        .then(res => res.text())
        .then(data => {
          document.getElementById("navbar").innerHTML = data;
          const connectBtn = document.getElementById("connectBtn");
          if (connectBtn) connectBtn.addEventListener("click", connectWallet);
          checkWalletStatus();
        });

      async function connectContract() {
        web3 = new Web3(window.ethereum);
        currentAccount = (await window.ethereum.request({ method: "eth_accounts" }))[0];
        contract = new web3.eth.Contract(window.campaignABI, window.campaignAddress);
      }

      async function createCampaign() {
        await connectContract();
        if (!currentAccount) return;

        const title = document.getElementById("title").value;
        const description = document.getElementById("description").value;
        const goalEth = document.getElementById("goal").value;
        const goalWei = web3.utils.toWei(goalEth, "ether");
        const deadlineInput = document.getElementById("deadline").value;
        const deadline = Math.floor(new Date(deadlineInput).getTime() / 1000);

        if (!title || !description || !goalEth || !deadlineInput) { // ✅ fixed: goalEth not goal
          document.getElementById("status").innerText = "Please fill in all fields!";
          return;
        }

        try {
          await contract.methods.createCampaign(title, description, goalWei, deadline).send({
            from: currentAccount,
            gas: 3000000
          });
          document.getElementById("status").innerText = "Campaign created successfully!";
          setTimeout(() => { window.location.href = "/html/my-campaigns.html"; }, 2000);
        } catch (err) {
          console.error(err);
          document.getElementById("status").innerText = "Transaction failed!";
        }
      }

      window.createCampaign = createCampaign;
    });
  </script>
</body>

</html>
