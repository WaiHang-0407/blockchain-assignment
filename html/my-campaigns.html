                "stateMutability": "view",
                "type": "function"
            }
        ];
        const Address = "0x912455f22466e9551149940D6A81B37D5C001A6F";

        let web3, contract, currentAccount;

        async function loadMyCampaigns() {
            if (!window.ethereum) {
                document.getElementById("myCampaignList").innerText = "MetaMask not detected!";
                return;
            }

            web3 = new Web3(window.ethereum);
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            currentAccount = accounts[0];
            contract = new web3.eth.Contract(ABI, Address);

            try {
                const myCampaigns = await contract.methods.getMyCampaigns(currentAccount).call();
                const listDiv = document.getElementById("myCampaignList");
                listDiv.innerHTML = "";

                if (!myCampaigns.length) {
                    listDiv.innerHTML = "<p>You haven’t created any campaigns yet.</p>";
                    return;
                }

                myCampaigns.forEach(c => {
                    const deadlineDate = new Date(c.deadline * 1000).toLocaleString();
                    const card = `
            <div class="campaign-card" onclick="viewCampaign(${c.id})">
              <h3>${c.title}</h3>
              <p>${c.description.substring(0, 80)}...</p>
              <p><strong>Goal:</strong> ${c.goal} Wei</p>
              <p><strong>Deadline:</strong> ${deadlineDate}</p>
              <p><strong>Funds Raised:</strong> ${c.fundsRaised} Wei</p>
            </div>
          `;
                    listDiv.innerHTML += card;
                });
            } catch (err) {
                console.error(err);
                document.getElementById("myCampaignList").innerText = "Failed to load campaigns!";
            }
        }

        function viewCampaign(id) {
            window.location.href = `/html/campaign-details.html?id=${id}`;
        }

        window.addEventListener("load", loadMyCampaigns);

        fetch("/html/navbar.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;
            })
            .catch(err => console.error("Error loading navbar:", err));
    </script>
