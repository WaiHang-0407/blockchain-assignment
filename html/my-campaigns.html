<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Campaigns</title>
    <link rel="stylesheet" href="/css/app.css">
    <link rel="stylesheet" href="/css/my-campaigns.css">
</head>

<body>
    <div id="navbar"></div>

    <div class="container">
        <h2 class="page-title">My Campaigns</h2>
        <div id="myCampaignList" class="campaign-grid"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        window.addEventListener("load", async () => {
            await guardPage();

            document.body.style.display = "block"; // ✅ reveal after guard passes

            fetch("/html/navbar.html")
                .then(res => res.text())
                .then(data => {
                    document.getElementById("navbar").innerHTML = data;
                    const connectBtn = document.getElementById("connectBtn");
                    if (connectBtn) connectBtn.addEventListener("click", connectWallet);
                    checkWalletStatus();
                });

            let contract;

            async function loadMyCampaigns() {
                if (!window.ethereum) {
                    document.getElementById("myCampaignList").innerText = "MetaMask not detected!";
                    return;
                }

                if (!web3) web3 = new Web3(window.ethereum);

                const accounts = await window.ethereum.request({ method: "eth_accounts" });
                currentAccount = accounts[0];

                contract = new web3.eth.Contract(window.campaignABI, window.campaignAddress);

                try {
                    const myCampaigns = await contract.methods.getMyCampaigns(currentAccount).call();
                    const listDiv = document.getElementById("myCampaignList");
                    listDiv.innerHTML = "";

                    if (!myCampaigns.length) {
                        listDiv.innerHTML = "<p id='no-my-campaigns'>You haven't created any campaigns yet.</p>";
                        return;
                    }

                    const now = Date.now() / 1000;

                    myCampaigns.forEach(c => {
                        const createdDate = new Date(c.createdAt * 1000).toLocaleString();
                        const deadlineDate = new Date(c.deadline * 1000).toLocaleString();
                        const goalEther = parseFloat(web3.utils.fromWei(c.goal.toString(), "ether"));
                        const fundsRaisedEther = parseFloat(web3.utils.fromWei(c.fundsRaised.toString(), "ether"));
                        const progressPercent = Math.min((fundsRaisedEther / goalEther) * 100, 100);

                        let statusText = "";
                        let deleteBtn = "";

                        if (c.isRefunded) {
                            statusText = `<p><em>Refunded</em></p>`;
                            deleteBtn = `<button class="deleteBtn" onclick="event.stopPropagation(); deleteCampaign(${c.id})">Delete</button>`;
                        } else if (c.isWithdrawn) {
                            statusText = `<p><em>Funds Withdrawn</em></p>`;
                            deleteBtn = `<button class="deleteBtn" onclick="event.stopPropagation(); deleteCampaign(${c.id})">Delete</button>`;
                        } else if (now >= c.deadline && fundsRaisedEther >= goalEther) {
                            statusText = `<button onclick="event.stopPropagation(); withdraw(${c.id})">Withdraw</button>`;
                        } else if (now >= c.deadline && fundsRaisedEther < goalEther) {
                            statusText = `<p><em>Auto Refunding...</em></p>`;
                        } else if (fundsRaisedEther >= goalEther) {
                            statusText = `<p><em>Goal Met</em></p>`;
                        } else if (now < c.deadline && fundsRaisedEther === 0) {
                            statusText = `<p><em>In Progress</em></p>`;
                            deleteBtn = `<button class="deleteBtn" onclick="event.stopPropagation(); deleteCampaign(${c.id})">Delete</button>`;
                        } else {
                            statusText = `<p><em>In Progress</em></p>`;
                        }

                        listDiv.innerHTML += `
                            <div class="campaign-card" onclick="viewCampaign(${c.id})">
                                <h3>${c.title}</h3>
                                <p><strong>Goal:</strong> ${goalEther} ETH</p>
                                <p><strong>Funds Raised:</strong> ${fundsRaisedEther} ETH</p>
                                <div class="progress-bar">
                                    <div class="progress-bar-fill" style="width: ${progressPercent}%;"></div>
                                </div>
                                <p class="progress-percentage">${progressPercent.toFixed(1)}% funded</p>
                                <p><strong>Created At:</strong> ${createdDate}</p>
                                <p><strong>Deadline:</strong> ${deadlineDate}</p>
                                ${statusText}
                                ${deleteBtn}
                            </div>`;
                    });

                    contract.events.RefundIssued()
                        .on("data", event => {
                            alert(`Refund issued to ${event.returnValues.contributor} for ${web3.utils.fromWei(event.returnValues.amount, "ether")} ETH`);
                            loadMyCampaigns();
                        });

                    contract.events.FundsWithdrawn()
                        .on("data", event => {
                            alert(`Funds withdrawn for ${web3.utils.fromWei(event.returnValues.amount, "ether")} ETH`);
                            loadMyCampaigns();
                        });

                } catch (err) {
                    console.error(err);
                    document.getElementById("myCampaignList").innerText = "Failed to load campaigns!";
                }
            }

            async function withdraw(id) {
                try {
                    await contract.methods.withdraw(id).send({ from: currentAccount });
                    alert("Funds withdrawn successfully!");
                    loadMyCampaigns();
                } catch (err) {
                    console.error(err);
                    alert("Withdrawal failed!");
                }
            }

            async function deleteCampaign(id) {
                if (!confirm("Are you sure you want to delete this campaign? This action cannot be undone.")) return;
                try {
                    await contract.methods.deleteCampaign(id).send({ from: currentAccount });
                    alert("Campaign deleted successfully!");
                    loadMyCampaigns();
                } catch (err) {
                    console.error(err);
                    alert("Delete failed: " + err.message);
                }
            }

            function viewCampaign(id) {
                window.location.href = `/html/campaign-details.html?id=${id}`;
            }

            window.deleteCampaign = deleteCampaign;
            window.viewCampaign = viewCampaign;
            window.withdraw = withdraw;

            loadMyCampaigns();
        });
    </script>
</body>

</html>
