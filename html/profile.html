<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <link rel="stylesheet" href="/css/app.css">
    <link rel="stylesheet" href="/css/profile.css">
</head>

<body>
    <div id="navbar"></div>

    <div class="profile-container">
        <h2 class="page-title">My Profile</h2>
        <div id="profileCard" class="profile-card">
            <div class="profile-picture-section">
                <div class="profile-picture-container">
                    <img id="profilePicture" src="/images/default-avatar.svg" alt="Profile Picture"
                        class="profile-picture">
                </div>
                <button class="edit-picture-btn" onclick="document.getElementById('pictureInput').click()">Change Picture</button>
                <input type="file" id="pictureInput" accept="image/*" style="display:none;"
                    onchange="uploadProfilePicture(event)">
            </div>

            <p><strong>Username:</strong> <span id="username">Loading...</span></p>
            <p><strong>Wallet Address:</strong> <span id="address">Loading...</span></p>
            <p><strong>ETH Balance:</strong> <span id="ethBalance">Loading...</span></p>
            <p><strong>Reward Tokens:</strong> <span id="tokenBalance">Loading...</span></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        window.addEventListener("load", async () => {
            await guardPage();

            document.body.style.display = "block"; // ✅ reveal after guard passes

            fetch("/html/navbar.html")
                .then(res => res.text())
                .then(data => {
                    document.getElementById("navbar").innerHTML = data;
                    const connectBtn = document.getElementById("connectBtn");
                    if (connectBtn) connectBtn.addEventListener("click", connectWallet);
                    checkWalletStatus();
                });

            async function loadProfile() {
                if (!web3) web3 = new Web3(window.ethereum);

                const accounts = await window.ethereum.request({ method: "eth_accounts" }); // ✅ no popup
                currentAccount = accounts[0];

                document.getElementById("address").innerText = currentAccount;

                const balanceWei = await web3.eth.getBalance(currentAccount);
                document.getElementById("ethBalance").innerText = `${web3.utils.fromWei(balanceWei, "ether")} ETH`;

                const userAuthContract = new web3.eth.Contract(window.userAuthABI, window.userAuthAddress);
                try {
                    const userData = await userAuthContract.methods.getUser(currentAccount).call();
                    document.getElementById("username").innerText = userData[0] || "(no username set)";
                } catch (err) {
                    console.error("Error fetching username:", err);
                    document.getElementById("username").innerText = "(error)";
                }

                const rewardTokenContract = new web3.eth.Contract(window.rewardTokenABI, window.rewardTokenAddress);
                const tokenBalance = await rewardTokenContract.methods.balanceOf(currentAccount).call();
                document.getElementById("tokenBalance").innerText = `${web3.utils.fromWei(tokenBalance, "ether")} CRT`;

                loadProfilePicture();
            }

            function uploadProfilePicture(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function (e) {
                    const imageData = e.target.result;
                    localStorage.setItem(`profilePicture_${currentAccount}`, imageData);
                    document.getElementById("profilePicture").src = imageData;
                    alert("Profile picture updated!");
                };
                reader.readAsDataURL(file);
            }

            function loadProfilePicture() {
                const saved = localStorage.getItem(`profilePicture_${currentAccount}`);
                if (saved) document.getElementById("profilePicture").src = saved;
            }

            window.uploadProfilePicture = uploadProfilePicture;

            loadProfile(); 
        });
    </script>
</body>

</html>
