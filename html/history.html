<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Transaction History</title>
    <link rel="stylesheet" href="/css/app.css">
    <link rel="stylesheet" href="/css/history.css">
</head>

<body>
    <div id="navbar"></div>

    <div class="history-container">
        <h2 class="page-title">Transaction History</h2>
        <div id="historyList" class="history-list">Loading history...</div>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle"></h3>
            <p id="modalBody"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        fetch("/html/navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;

                const connectBtn = document.getElementById("connectBtn");
                if (connectBtn) {
                    connectBtn.addEventListener("click", connectWallet);
                }

                checkWalletStatus();
            });

        let contract;

        async function getCampaignName(id) {
            try {
                const campaign = await contract.methods.getCampaign(id).call();
                return campaign.title; // now returns the actual title
            } catch {
                return `Campaign #${id}`;
            }
        }

        function shortenAddress(addr) {
            return addr.slice(0, 6) + "..." + addr.slice(-4);
        }

        async function viewDetails(action, campaignId, amount, date, actor) {
            try {
                const campaign = await contract.methods.getCampaign(campaignId).call();

                document.getElementById("modalTitle").innerText = `${action} Details`;
                document.getElementById("modalBody").innerHTML = `
      <strong>Campaign Name:</strong> ${campaign.title}<br>
      <strong>Description:</strong> ${campaign.description}<br>
      <strong>ID:</strong> ${campaign.id}<br>
      <strong>Funds Raised:</strong> ${web3.utils.fromWei(campaign.fundsRaised, "ether")} ETH<br>
      <strong>Created At:</strong> ${new Date(campaign.createdAt * 1000).toLocaleString()}<br>
      <strong>Deadline:</strong> ${new Date(campaign.deadline * 1000).toLocaleString()}<br>
      <strong>Creator:</strong> ${shortenAddress(campaign.creator)}<br><br>

      <strong>Action:</strong> ${action}<br>
      <strong>Amount:</strong> ${amount} ETH<br>
      <strong>Date:</strong> ${date}<br>
      <strong>Executed by:</strong> ${actor}
    `;
                document.getElementById("detailsModal").style.display = "block";
            } catch (err) {
                console.error("Error fetching campaign details:", err);
            }
        }

        function closeModal() {
            document.getElementById("detailsModal").style.display = "none";
        }

        async function loadHistory() {
            web3 = new Web3(window.ethereum);
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            const currentAccount = accounts[0];
            contract = new web3.eth.Contract(window.campaignABI, window.campaignAddress);

            // Fetch events directly tied to this account
            const contributionEvents = await contract.getPastEvents("ContributionMade", {
                filter: { contributor: currentAccount },
                fromBlock: 0,
                toBlock: "latest"
            });
            const refundEvents = await contract.getPastEvents("RefundIssued", {
                filter: { contributor: currentAccount },
                fromBlock: 0,
                toBlock: "latest"
            });
            const refundCompletedEvents = await contract.getPastEvents("RefundCompleted", {
                fromBlock: 0,
                toBlock: "latest"
            });
            const withdrawEvents = await contract.getPastEvents("FundsWithdrawn", {
                filter: { creator: currentAccount },
                fromBlock: 0,
                toBlock: "latest"
            });
            const createdEvents = await contract.getPastEvents("CampaignCreated", {
                filter: { creator: currentAccount },
                fromBlock: 0,
                toBlock: "latest"
            });

            // Get campaigns created by this account
            const myCampaigns = await contract.methods.getMyCampaigns(currentAccount).call();

            // Collect contributions to your campaigns
            let creatorContributionEvents = [];
            for (let c of myCampaigns) {
                const contribs = await contract.getPastEvents("ContributionMade", {
                    filter: { campaignId: c.id },
                    fromBlock: 0,
                    toBlock: "latest"
                });
                creatorContributionEvents.push(...contribs);
            }

            // Collect campaign IDs the current account contributed to
            let contributedCampaignIds = contributionEvents.map(ev => ev.returnValues.campaignId);

            // Fetch withdrawal events for those campaigns
            let contributedWithdrawEvents = [];
            for (let id of contributedCampaignIds) {
                const withdraws = await contract.getPastEvents("FundsWithdrawn", {
                    filter: { campaignId: id },   // filter by campaignId
                    fromBlock: 0,
                    toBlock: "latest"
                });
                contributedWithdrawEvents.push(...withdraws);
            }

            // Merge everything
            let allEvents = [
                ...contributionEvents,
                ...refundEvents,
                ...contributedWithdrawEvents,  // 👈 add withdrawals for campaigns you contributed to
                ...withdrawEvents,             // creator’s own withdrawals
                ...createdEvents,
                ...creatorContributionEvents
            ];

            // Sort by timestamp (latest first)
            allEvents.sort((a, b) => b.returnValues.timestamp - a.returnValues.timestamp);

            // Render
            // Render
            let html = "";
            if (allEvents.length === 0) {
                html = "<p>No history found.</p>";
            } else {
                html = `
    <table class="history-table">
      <thead>
        <tr>
          <th>Action</th>
          <th>Campaign Name</th>
          <th>Amount (ETH)</th>
          <th>Date</th>
          <th>Executed by</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody>
  `;

                for (let ev of allEvents) {
                    const ts = new Date(ev.returnValues.timestamp * 1000).toLocaleString();
                    let action = "";
                    let campaignId = ev.returnValues.campaignId || ev.returnValues.id;
                    let campaignName = await getCampaignName(campaignId);
                    let amount = "-";
                    let actor = "";

                    switch (ev.event) {
                        case "ContributionMade":
                            action = "Contribution";
                            amount = web3.utils.fromWei(ev.returnValues.amount, "ether");
                            actor = shortenAddress(ev.returnValues.contributor);
                            break;

                        case "RefundIssued":
                            action = "Refund";
                            amount = web3.utils.fromWei(ev.returnValues.amount, "ether");
                            actor = shortenAddress(ev.returnValues.contributor);
                            break;

                        case "FundsWithdrawn":
                            action = "Withdrawal";
                            amount = web3.utils.fromWei(ev.returnValues.amount, "ether");
                            actor = shortenAddress(ev.returnValues.creator);
                            break;

                        default:
                            continue;
                    }

                    html += `
    <tr>
      <td>${action}</td>
      <td>${campaignName}</td>
      <td>${amount}</td>
      <td>${ts}</td>
      <td>${actor}</td>
      <td><button onclick="viewDetails('${action}', '${campaignId}', '${amount}', '${ts}', '${actor}')">View</button></td>
    </tr>
  `;
                }

                html += "</tbody></table>";
            }

            document.getElementById("historyList").innerHTML = html;

            document.getElementById("historyList").innerHTML = html;
        }

        window.addEventListener("load", async () => {
            await loadHistory();
        });
    </script>
</body>

</html>
