<!DOCTYPE html>
<html>

<head>
  <title>User Registration</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/register.css">
</head>

<body>
  <div id="navbar"></div>

  <div class="card">
    <h2>User Registration</h2>
    <p class="subtitle">Connect your wallet and choose a username</p>
    <input type="text" id="username" placeholder="Enter username" />
    <button id="registerButton" onclick="registerUser()">Register</button>
    <p id="status"></p>
    <div class="login-link">
      <a href="/html/login.html">Already have an account?</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    let contract;

    fetch("/html/navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;

                const connectBtn = document.getElementById("connectBtn");
                if (connectBtn) {
                    connectBtn.addEventListener("click", connectWallet);
                }

                checkWalletStatus();
            });

    // Connect to MetaMask and set up contract instance
    async function connectContract() {
      if (!window.ethereum) {
        document.getElementById("status").innerText = "MetaMask not detected!";
        return;
      }
      web3 = new Web3(window.ethereum);
      const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
      currentAccount = accounts[0];
      contract = new web3.eth.Contract(window.userAuthABI, window.userAuthAddress);
    }

    // Register user function
    async function registerUser() {
      await connectContract();
      const username = document.getElementById("username").value;

      if (!username) {
        document.getElementById("status").innerText = "Please enter a username!";
        return;
      }

      try {
        // Check if username is already taken
        const taken = await contract.methods.isUserRegistered(currentAccount).call();
        if (taken) {
          document.getElementById("status").innerText = "Username already registered!";
          return;
        }
        // Register
        await contract.methods.register(username).send({
          from: currentAccount,
          gas: 3000000
        });
        document.getElementById("status").innerText = "Registered successfully!";
        setTimeout(() => { window.location.href = "/html/home.html"; }, 1500);
      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "Transaction failed!";
      }
    }
  </script>
</body>

</html>
